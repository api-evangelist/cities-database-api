  - Locations
  - Reference Data
  - Travel
description: >-
  The Cities Database API by AirLabs provides a global reference dataset of cities keyed to IATA metropolitan area
  codes, ISO country codes, and geographic coordinates. The API is consumed alongside the AirLabs Airports, Airlines,
  and Flights APIs to power travel search, mapping, geocoding, and clustering experiences. Authentication uses an
  api_key query parameter obtained from the AirLabs account dashboard. All responses are JSON arrays of city objects.
apis:
  - aid: cities-database-api:airlabs-cities-api
    name: AirLabs Cities API
    tags:
      - Cities
      - Geography
      - IATA
      - Reference Data
      - Travel
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://airlabs.co/api/v9
    humanURL: https://airlabs.co/docs/cities
    properties:
      - url: https://airlabs.co/docs/cities
        type: Documentation
      - url: https://airlabs.co/docs
        type: APIReference
      - url: https://airlabs.co/account/api-key
        type: Authentication
      - url: openapi/cities-database-api-openapi.yml
        type: OpenAPI
    description: >-
      The AirLabs Cities API exposes a single GET /cities endpoint that returns a list of cities filterable by IATA
      city_code, ISO 2 country_code, or comma-separated _fields. Free-tier responses include name, city_code, latitude,
      longitude, and country_code; paid tiers add UN/LOCODE, elevation, timezone, population, multilingual names,
      Wikipedia links, and SEO slugs. Authentication uses the api_key query parameter.
