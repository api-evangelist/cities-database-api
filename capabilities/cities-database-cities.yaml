naftiko: 1.0.0-alpha2
info:
  label: AirLabs Cities Database API — Cities
  description: 'AirLabs Cities Database API — Cities. 1 operations. Lead operation: List cities. Self-contained Naftiko capability
    covering one Cities Database Api business surface.'
  tags:
  - Cities Database Api
  - Cities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CITIES_DATABASE_API_API_KEY: CITIES_DATABASE_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: cities-database-cities
    baseUri: https://airlabs.co/api/v9
    description: AirLabs Cities Database API — Cities business capability. Self-contained, no shared references.
    resources:
    - name: cities
      path: /cities
      operations:
      - name: listcities
        method: GET
        description: List cities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api_key
          in: query
          type: string
          description: AirLabs API key from the account dashboard.
          required: true
        - name: city_code
          in: query
          type: string
          description: IATA metropolitan city code (e.g. NYC, LON, PAR).
        - name: country_code
          in: query
          type: string
          description: ISO 2 country code (e.g. US, GB, FR).
        - name: _fields
          in: query
          type: string
          description: Comma-separated list of fields to include in the response.
    authentication:
      type: apikey
      key: api_key
      value: '{{env.CITIES_DATABASE_API_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: cities-database-cities-rest
    port: 8080
    description: REST adapter for AirLabs Cities Database API — Cities. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/cities
      name: cities
      description: REST surface for cities.
      operations:
      - method: GET
        name: listcities
        description: List cities
        call: cities-database-cities.listcities
        with:
          api_key: rest.api_key
          city_code: rest.city_code
          country_code: rest.country_code
          _fields: rest._fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cities-database-cities-mcp
    port: 9090
    transport: http
    description: MCP adapter for AirLabs Cities Database API — Cities. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-cities
      description: List cities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cities-database-cities.listcities
      with:
        api_key: tools.api_key
        city_code: tools.city_code
        country_code: tools.country_code
        _fields: tools._fields
      outputParameters:
      - type: object
        mapping: $.
